<style>

  :root{
    --bg:#f1f5f9;--white:#fff;--slate900:#0f172a;--slate800:#1e293b;
    --slate700:#334155;--slate500:#64748b;--slate400:#94a3b8;--slate200:#e2e8f0;--slate100:#f1f5f9;
    --blue600:#2563eb;--blue50:#eff6ff;
    --green600:#16a34a;--green50:#f0fdf4;
    --red600:#dc2626;--red50:#fef2f2;
    --amber600:#d97706;--amber50:#fffbeb;
    --purple600:#7c3aed;--purple50:#f5f3ff;
    --font:"Segoe UI",system-ui,sans-serif;
    --nav-h:64px;
  }

  #root{height:100%}
  button{font-family:var(--font);cursor:pointer}
  input,select{font-family:var(--font)}
  input:focus,select:focus{outline:2px solid var(--blue600);outline-offset:1px}
  ::-webkit-scrollbar{width:4px;height:4px}
  ::-webkit-scrollbar-thumb{background:var(--slate200);border-radius:4px}

  /* ── LAYOUT ── */
  .app{display:flex;height:100%;position:relative;overflow:hidden}

  /* Desktop sidebar */
  .sidebar{width:256px;background:var(--slate900);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100%;z-index:200;overflow-y:auto;transition:transform .25s}
  .main{margin-left:256px;flex:1;height:100%;overflow-y:auto;padding-bottom:0}
  .page{padding:20px;max-width:900px;margin:0 auto}

  /* Mobile: hide sidebar, show bottom nav */
  @media(max-width:768px){
    .sidebar{transform:translateX(-100%)}
    .sidebar.open{transform:translateX(0)}
    .sidebar-overlay{display:block}
    .main{margin-left:0;padding-bottom:var(--nav-h)}
    .bottom-nav{display:flex}
  }
  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:190}
  .bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--slate900);border-top:1px solid var(--slate800);z-index:200;align-items:stretch}
  .bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:var(--slate400);font-size:10px;font-weight:600;padding:8px 4px;transition:all .15s;min-width:0}
  .bn-item.active{color:var(--purple600)}
  .bn-item .bn-icon{font-size:20px}
  .bn-label{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:56px}

  /* ── SIDEBAR CONTENT ── */

  .logo-title{font-size:18px;font-weight:900;color:#f8fafc;letter-spacing:1px}
  .logo-sub{font-size:10px;color:var(--slate500)}
  .user-badge{margin:12px;padding:10px 12px;border-radius:8px;border:1px solid;display:flex;align-items:center;gap:10}
  .role-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
  .nav-area{padding:8px;flex:1}
  .nav-btn{width:100%;background:none;border:none;color:var(--slate400);padding:9px 14px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:10;font-size:13px;text-align:left;margin-bottom:2px;transition:all .15s;font-weight:400}
  .nav-btn.active{background:var(--slate800);color:#f8fafc;font-weight:700}
  .logout-btn{margin:12px;padding:10px;background:rgba(220,38,38,.13);color:#f87171;border:1px solid rgba(220,38,38,.27);border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;width:calc(100% - 24px)}
  .menu-toggle{display:none;background:none;border:none;color:#f8fafc;font-size:24px;padding:8px;cursor:pointer}

  .select{padding:9px 12px;border:1px solid var(--slate200);border-radius:8px;font-size:14px;font-family:var(--font);background:var(--white)}

  .scan-frame{width:65%;height:65%;border:3px solid rgba(124,58,237,.9);border-radius:12px;box-shadow:0 0 0 9999px rgba(0,0,0,.45),0 0 20px rgba(124,58,237,.6)}

  @keyframes scanline{0%,100%{transform:translateY(0)}50%{transform:translateY(calc(0.65 * 360px - 6px))}}
  .scanner-status{position:absolute;bottom:0;left:0;right:0;padding:10px;background:rgba(0,0,0,.6);color:#fff;text-align:center;font-size:12px;font-weight:600}

  .result-ok{background:var(--green50);border:2px solid var(--green600);border-radius:12px;padding:14px;margin-bottom:12px}
  .result-warn{background:var(--amber50);border:2px solid var(--amber600);border-radius:12px;padding:14px;margin-bottom:12px}
  .result-err{background:var(--red50);border:2px solid var(--red600);border-radius:12px;padding:14px;margin-bottom:12px}
  .result-title{font-weight:800;font-size:16px;margin-bottom:6px}
</style>
</head>

function makeKode(id){
  const h=Math.abs([...id].reduce((a,c)=>a*31+c.charCodeAt(0),0))%90000+10000;
  const t=id.replace(/\D/g,"").padStart(3,"0").slice(-3);
  return "QRB-"+h+"-"+t;
}

function fmt(n){return new Intl.NumberFormat("id-ID").format(n)}

// ================================================================

let _toastTimer=null;
function showToast(msg,type){
  const el=document.getElementById("toast");
  el.textContent=(type==="error"?"❌ ":type==="warn"?"⚠️ ":"✅ ")+msg;

  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>el.classList.remove("show"),3500);

let _modalCb=null;

document.getElementById("modal-confirm-btn").onclick=()=>{if(_modalCb)_modalCb();closeModal();};

// ================================================================
// QR SVG GENERATOR
// ================================================================
function buildQRMatrix(text){
  const S=25;
  let seed=Math.abs([...text].reduce((a,c)=>(a*31+c.charCodeAt(0))&0x7fffffff,0));
  function inFinder(r,c){return(r<7&&c<7)||(r<7&&c>=S-7)||(r>=S-7&&c<7)}
  function finderBit(r,c){
    function dot(br,bc){const lr=r-br,lc=c-bc;if(lr===0||lr===6||lc===0||lc===6)return 1;if(lr>=2&&lr<=4&&lc>=2&&lc<=4)return 1;return 0}
    if(r<7&&c<7)return dot(0,0);if(r<7&&c>=S-7)return dot(0,S-7);if(r>=S-7&&c<7)return dot(S-7,0);return 0;
  }
  const m=[];
  for(let r=0;r<S;r++){const row=[];for(let c=0;c<S;c++){
    if(inFinder(r,c)){row.push(finderBit(r,c))}
    else if(r===6||c===6){row.push((r+c)%2===0?1:0)}
    else{seed=(seed*1664525+1013904223)&0x7fffffff;row.push((seed>>14)&1)}
  }m.push(row)}
  return m;
}
function qrSVG(text,sz){
  sz=sz||80;
  const m=buildQRMatrix(text),cell=sz/25;
  let rects='';
  m.forEach((row,r)=>row.forEach((v,c)=>{if(v)rects+=`<rect x="${c*cell}" y="${r*cell}" width="${cell}" height="${cell}"/>` }));
  return `<svg width="${sz}" height="${sz}" style="display:block;image-rendering:pixelated;border-radius:4px"><rect width="${sz}" height="${sz}" fill="white"/><g fill="#1e293b">${rects}</g></svg>`;
}

// ================================================================
// BARCODE SVG
// ================================================================
function barcodeSVG(text,w,h){
  w=w||240;h=h||44;
  const bw=Math.max((w-12)/(text.length*9.5+4),.8);
  let bars='',x=6;
  for(let i=0;i<text.length;i++){
    const code=text.charCodeAt(i);
    for(let b=7;b>=0;b--){if((code>>b)&1)bars+=`<rect x="${x}" y="4" width="${Math.max(bw*1.2,.8)}" height="${h-8}"/>`;x+=bw*1.4}
    x+=bw*.5;
  }
  return `<svg width="${w}" height="${h}" style="display:block"><rect width="${w}" height="${h}" fill="white" rx="3"/><g fill="#1e293b">${bars}</g></svg>`;
}

function kuponHTML(m,compact){

function doDistribute(m){
  const rec={id:genId("D"),mustahiqId:m.id,petugasId:STATE.user.id,waktu:new Date().toISOString(),jumlahKG:m.jumlahKG,kuponKode:m.kuponKode,metode:STATE.scanMode,nama:m.nama,wilayah:m.wilayah,nik:m.nik};
  STATE.distribusi.push(rec);
  const idx=STATE.mustahiq.findIndex(x=>x.id===m.id);
  if(idx>=0)STATE.mustahiq[idx]={...STATE.mustahiq[idx],status:"sudah",distribusiId:rec.id};
  STATE.scanLog.unshift(rec);
  return rec;
}

// ================================================================
// CAMERA SCANNER
// ================================================================
let _camActive=false,_animFrame=null,_stream=null;

async function startCamera(){
  const vid=document.getElementById("scan-video");
  const canv=document.getElementById("scan-canvas");
  if(!vid||!canv)return;
  stopCamera();
  try{
    const constraints={video:{facingMode:STATE.camFacing,width:{ideal:1280},height:{ideal:720}}};
    _stream=await navigator.mediaDevices.getUserMedia(constraints);
    vid.srcObject=_stream;
    await vid.play();
    _camActive=true;
    document.getElementById("scanner-status").textContent="📷 Arahkan kamera ke kupon...";
    tickScan(vid,canv);
  }catch(e){
    document.getElementById("scanner-status").textContent="❌ Kamera tidak bisa diakses: "+e.message;
    console.error(e);
  }
}

function stopCamera(){
  _camActive=false;
  if(_animFrame){cancelAnimationFrame(_animFrame);_animFrame=null}
  if(_stream){_stream.getTracks().forEach(t=>t.stop());_stream=null}
}

function tickScan(vid,canv){
  if(!_camActive)return;
  if(vid.readyState===vid.HAVE_ENOUGH_DATA){
    canv.width=vid.videoWidth;canv.height=vid.videoHeight;
    const ctx=canv.getContext("2d");
    ctx.drawImage(vid,0,0,canv.width,canv.height);
    const img=ctx.getImageData(0,0,canv.width,canv.height);
    if(typeof jsQR!=="undefined"){
      const code=jsQR(img.data,img.width,img.height,{inversionAttempts:"dontInvert"});
      if(code&&code.data){
        handleScannedCode(code.data.trim().toUpperCase());
        return; // pause briefly then resume
      }
    }
  }
  _animFrame=requestAnimationFrame(()=>tickScan(vid,canv));
}

function handleScannedCode(kode){
  stopCamera();
  const target=STATE.mustahiq.find(m=>m.kuponKode===kode);
  if(!target){
    STATE.scanResult={status:"notfound",kode};
    renderPage();
    showToast("Kupon tidak ditemukan: "+kode,"error");
    setTimeout(()=>{if(_camActive||document.getElementById("scan-video"))startCamera();},2000);
    return;
  }
  if(target.status==="sudah"){
    STATE.scanResult={status:"used",mustahiq:target};
    renderPage();
    showToast(target.nama+" sudah mengambil daging!","warn");
    setTimeout(()=>startCamera(),2500);
    return;
  }
  STATE.confirmPending=target;
  STATE.scanResult=null;
  renderPage();
}

function switchCamera(){
  STATE.camFacing=STATE.camFacing==="environment"?"user":"environment";
  if(_camActive)startCamera();
}

function editMustahiq(id){
  const m=STATE.mustahiq.find(x=>x.id===id);if(!m)return;
  if(m.status==="sudah"){showToast("Sudah distribusi, tidak bisa diedit.","error");return;}
  if(STATE.user.role!=="admin"&&m.petugasId!==STATE.user.id){showToast("Anda hanya bisa edit data sendiri.","error");return;}
  _mForm={nama:m.nama,nik:m.nik,alamat:m.alamat,wilayah:m.wilayah,kategori:m.kategori,jumlahKG:m.jumlahKG};
  _editMustahiqId=id;_showMustahiqForm=true;renderPage();
}

function saveMustahiq(){
  // read current form values from DOM
  const getV=(id)=>{const el=document.getElementById(id);return el?el.value.trim():""};
  _mForm.nama=getV("mf-nama")||_mForm.nama;
  _mForm.nik=getV("mf-nik")||_mForm.nik;
  _mForm.alamat=getV("mf-alamat")||_mForm.alamat;
  _mForm.wilayah=getV("mf-wilayah")||_mForm.wilayah;
  if(!_mForm.nama||!_mForm.nik||!_mForm.alamat||!_mForm.wilayah){showToast("Lengkapi semua data!","error");return;}
  if(_mForm.nik.length!==16){showToast("NIK harus 16 digit!","error");return;}
  const dup=STATE.mustahiq.find(m=>m.nik===_mForm.nik&&m.id!==_editMustahiqId);
  if(dup){showToast("NIK sudah terdaftar! Duplikat.","error");return;}
  if(_editMustahiqId){
    const idx=STATE.mustahiq.findIndex(m=>m.id===_editMustahiqId);
    if(idx>=0)STATE.mustahiq[idx]={...STATE.mustahiq[idx],..._mForm,jumlahKG:parseFloat(_mForm.jumlahKG)};
    showToast("Data mustahiq diperbarui.");
  } else {
    const nid=genId("M");
    STATE.mustahiq.push({id:nid,..._mForm,jumlahKG:parseFloat(_mForm.jumlahKG),status:"belum",petugasId:STATE.user.id,tanggal:todayStr(),distribusiId:null,kuponKode:makeKode(nid),kuponCetak:false});
    showToast("Mustahiq ditambahkan — kupon otomatis digenerate.");
  }
  _showMustahiqForm=false;_editMustahiqId=null;renderPage();
}

function delMustahiq(id){
  const m=STATE.mustahiq.find(x=>x.id===id);if(!m)return;
  if(m.status==="sudah"){showToast("Tidak bisa hapus — sudah didistribusi.","error");return;}
  openModal("Hapus Mustahiq","Hapus data "+m.nama+"?","Ya, Hapus",true,()=>{
    STATE.mustahiq=STATE.mustahiq.filter(x=>x.id!==id);showToast("Data dihapus.","error");renderPage();
  });
}

function renderKupon(){
  const myMustahiq=STATE.user.role==="pendataan"?STATE.mustahiq.filter(m=>m.wilayah===STATE.user.wilayah):STATE.mustahiq;
  const wilayahs=[...new Set(myMustahiq.map(m=>m.wilayah))];
  const filtered=myMustahiq.filter(m=>{
    const ms=m.nama.toLowerCase().includes(STATE.kuponSearch.toLowerCase())||m.kuponKode.includes(STATE.kuponSearch.toUpperCase());
    const mw=STATE.kuponFilterW==="semua"||m.wilayah===STATE.kuponFilterW;
    const mc=STATE.kuponFilterC==="semua"||(STATE.kuponFilterC==="cetak"?m.kuponCetak:!m.kuponCetak);
    return ms&&mw&&mc;
  });
  const belumCetak=filtered.filter(m=>!m.kuponCetak).length;

  const cards=filtered.map(m=>`<div style="margin-bottom:16px">
    <div style="overflow-x:auto">${kuponHTML(m,false)}</div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn btn-secondary btn-sm" style="flex:1" onclick="previewKupon('${m.id}')">🔍 Preview</button>
      <button class="btn btn-sm" style="flex:1;background:${m.kuponCetak?"#475569":"#7c3aed"};color:#fff" onclick="printKupon('${m.id}')">🖨️ ${m.kuponCetak?"Cetak Ulang":"Cetak"}</button>
    </div>
  </div>`).join("");

  return `<div class="page">
    <div class="page-header"><span style="font-size:24px">🎫</span><div><h2>Kelola Kupon</h2><p>Generate, preview, dan cetak kupon distribusi</p></div></div>
    <div class="stat-grid">
      <div class="stat-card" style="color:#7c3aed"><div class="stat-icon">🎫</div><div class="stat-val" style="color:#7c3aed">${myMustahiq.length}</div><div class="stat-lbl">Total Kupon</div></div>
      <div class="stat-card" style="color:#2563eb"><div class="stat-icon">🖨️</div><div class="stat-val" style="color:#2563eb">${myMustahiq.filter(m=>m.kuponCetak).length}</div><div class="stat-lbl">Sudah Dicetak</div></div>
      <div class="stat-card" style="color:#d97706"><div class="stat-icon">⬜</div><div class="stat-val" style="color:#d97706">${myMustahiq.filter(m=>!m.kuponCetak).length}</div><div class="stat-lbl">Belum Dicetak</div></div>
      <div class="stat-card" style="color:#16a34a"><div class="stat-icon">✅</div><div class="stat-val" style="color:#16a34a">${myMustahiq.filter(m=>m.status==="sudah").length}</div><div class="stat-lbl">Sudah Dipakai</div></div>
    </div>
    <div class="toolbar">
      <div class="search-box"><span>🔍</span><input class="search-input" value="${STATE.kuponSearch}" oninput="STATE.kuponSearch=this.value;renderPage()" placeholder="Cari nama atau kode..."></div>
      <select class="select" onchange="STATE.kuponFilterW=this.value;renderPage()">
        <option value="semua">Semua Wilayah</option>
        ${wilayahs.map(w=>`<option value="${w}" ${STATE.kuponFilterW===w?"selected":""}>${w}</option>`).join("")}
      </select>
      <select class="select" onchange="STATE.kuponFilterC=this.value;renderPage()">
        <option value="semua">Semua Status</option>
        <option value="belum" ${STATE.kuponFilterC==="belum"?"selected":""}>Belum Dicetak</option>
        <option value="cetak" ${STATE.kuponFilterC==="cetak"?"selected":""}>Sudah Dicetak</option>
      </select>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <button class="btn btn-sm" style="background:#7c3aed;color:#fff" onclick="printAllKupon()">🖨️ Cetak Semua (${filtered.length})</button>
    </div>
    ${belumCetak>0?`<div style="background:#fffbeb;border:1px solid #fcd34d;border-radius:8px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:8px"><span>⚠️</span><span style="color:#92400e;font-size:13px"><strong>${belumCetak} kupon</strong> belum dicetak. Cetak sebelum hari distribusi.</span></div>`:""}
    ${filtered.length===0?`<div class="empty-state">Tidak ada kupon sesuai filter</div>`:""}
    ${cards}
  </div>`;
}

function previewKupon(id){
  const m=STATE.mustahiq.find(x=>x.id===id);if(!m)return;
  const box=document.getElementById("modal-box");
  box.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <div class="modal-title">🎫 Preview Kupon</div>
    <button onclick="closeModal()" style="background:none;border:none;font-size:20px;cursor:pointer">✖</button>
  </div>
  <div style="overflow-x:auto;margin-bottom:14px">${kuponHTML(m,false)}</div>
  <div style="background:#f8fafc;border-radius:8px;padding:10px;margin-bottom:14px;font-size:12px;color:#475569">
    <strong>Kode:</strong> <code style="color:#7c3aed;font-weight:700">${m.kuponKode}</code><br>
    <strong>Status:</strong> ${m.status==="sudah"?"✅ Sudah Dipakai":"⏳ Belum Dipakai"}<br>
    <strong>Cetak:</strong> ${m.kuponCetak?"🖨️ Sudah":"⬜ Belum"}
  </div>
  <div style="display:flex;gap:10px">
    <button class="btn btn-secondary" style="flex:1" onclick="closeModal()">Tutup</button>
    <button class="btn" style="flex:1;background:#7c3aed;color:#fff" onclick="printKupon('${id}');closeModal()">🖨️ Cetak</button>
  </div>`;
  document.getElementById("modal-overlay").classList.add("show");
}

function printKupon(id){
  const m=STATE.mustahiq.find(x=>x.id===id);if(!m)return;
  const idx=STATE.mustahiq.findIndex(x=>x.id===id);
  if(idx>=0)STATE.mustahiq[idx].kuponCetak=true;
  const area=document.getElementById("kupon-print-area");
  area.innerHTML=kuponHTML(m,true);
  showToast("Membuka dialog cetak...");
  setTimeout(()=>window.print(),200);
}

function printAllKupon(){
  const myMustahiq=STATE.user.role==="pendataan"?STATE.mustahiq.filter(m=>m.wilayah===STATE.user.wilayah):STATE.mustahiq;
  myMustahiq.forEach(m=>{const i=STATE.mustahiq.findIndex(x=>x.id===m.id);if(i>=0)STATE.mustahiq[i].kuponCetak=true;});
  const area=document.getElementById("kupon-print-area");
  area.innerHTML=myMustahiq.map(m=>kuponHTML(m,true)).join("<div style='width:8px'></div>");
  showToast("Mencetak "+myMustahiq.length+" kupon...");
  setTimeout(()=>window.print(),200);
}

  const pending=STATE.mustahiq.filter(m=>m.status==="belum");

function submitManualKupon(){
  const kode=(STATE.kuponInput||"").trim().toUpperCase();
  if(!kode){showToast("Masukkan kode kupon!","error");return;}
  const target=STATE.mustahiq.find(m=>m.kuponKode===kode);
  if(!target){STATE.scanResult={status:"notfound",kode};STATE.confirmPending=null;renderPage();return;}
  if(target.status==="sudah"){STATE.scanResult={status:"used",mustahiq:target};STATE.confirmPending=null;renderPage();return;}
  STATE.confirmPending=target;STATE.scanResult=null;STATE.kuponInput="";renderPage();
}

    <td><code style="font-size:10px;color:#7c3aed;font-weight:700">${m.kuponKode}</code></td>
    <td><strong style="color:#dc2626">${m.jumlahKG} kg</strong></td>
    <td><button class="btn btn-sm" style="background:${STATE.confirmPending&&STATE.confirmPending.id===m.id?"#0ea5e9":"#16a34a"};color:#fff" onclick="listSelectConfirm('${m.id}')">${STATE.confirmPending&&STATE.confirmPending.id===m.id?"Konfirm":"✅"}</button></td>
  </tr>`).join("");

  return `<div>
    <div class="toolbar">
      <div class="search-box"><span>🔍</span><input class="search-input" value="${STATE.distSearch}" oninput="STATE.distSearch=this.value;renderPage()" placeholder="Cari nama atau NIK..."></div>
      <select class="select" onchange="STATE.distFilterW=this.value;renderPage()">
        <option value="semua">Semua Wilayah</option>
        ${wilayahs.map(w=>`<option value="${w}" ${STATE.distFilterW===w?"selected":""}>${w}</option>`).join("")}
      </select>
    </div>
    ${confirmHTML}
    <div class="card">
      <div style="font-size:11px;color:#94a3b8;margin-bottom:8px">Antrian: <strong style="color:#d97706">${filtered.length} mustahiq</strong></div>
      <div class="tbl-wrap"><table class="tbl">
        <thead><tr><th>No</th><th>Nama</th><th>Kupon</th><th>Jatah</th><th>Aksi</th></tr></thead>
        <tbody>${filtered.length===0?`<tr><td colspan="5" style="text-align:center;color:#94a3b8;padding:24px">🎉 Semua sudah terdistribusi!</td></tr>`:rows}</tbody>
      </table></div>
    </div>
  </div>`;
}

function listSelectConfirm(id){
  if(STATE.confirmPending&&STATE.confirmPending.id===id){confirmDist();return;}
  const m=STATE.mustahiq.find(x=>x.id===id);if(!m)return;
  STATE.confirmPending=m;renderPage();
}

function renderScanResult(){
  const r=STATE.scanResult;
  if(!r)return "";
  if(r.status==="ok")return `<div class="result-ok"><div class="result-title" style="color:#16a34a">✅ DISTRIBUSI BERHASIL</div><div style="font-size:13px;color:#166534"><strong>${r.mustahiq.nama}</strong> — ${r.mustahiq.wilayah}<br><span style="font-size:15px;font-weight:800;color:#16a34a">🥩 ${r.mustahiq.jumlahKG} kg</span></div></div>`;
  if(r.status==="used")return `<div class="result-warn"><div class="result-title" style="color:#d97706">⚠️ KUPON SUDAH DIPAKAI</div><div style="font-size:13px;color:#92400e"><strong>${r.mustahiq.nama}</strong> sudah mengambil daging sebelumnya.</div></div>`;
  return `<div class="result-err"><div class="result-title" style="color:#dc2626">❌ KUPON TIDAK VALID</div><div style="font-size:13px;color:#991b1b">Kode <code style="background:#fee2e2;padding:0 4px;border-radius:3px">${r.kode}</code> tidak ditemukan.</div></div>`;
}

function cancelConfirm(){STATE.confirmPending=null;STATE.scanResult=null;if(STATE.scanMode==="camera")startCamera();renderPage();}
function confirmDist(){
  if(!STATE.confirmPending)return;
  doDistribute(STATE.confirmPending);
  STATE.scanResult={status:"ok",mustahiq:STATE.confirmPending};
  const nama=STATE.confirmPending.nama,kg=STATE.confirmPending.jumlahKG;
  STATE.confirmPending=null;
  showToast(nama+" — "+kg+" kg berhasil dicatat!");
  renderPage();
  if(STATE.scanMode==="camera")setTimeout(()=>startCamera(),2500);
}

// ================================================================
// HEWAN
// ================================================================
let _showHewanForm=false,_hForm={jenis:"Sapi",nomorHewan:"",beratKg:"",estimasiDaging:""};
function renderHewan(){
  const formHTML=_showHewanForm?`<div class="card" style="background:#f8fafc;border:1px solid #e2e8f0">
    <div class="card-title">Tambah Hewan Qurban</div>
    <div class="form-grid">
      <div class="form-group"><label class="form-label">Jenis</label><select class="select" style="width:100%" onchange="_hForm.jenis=this.value"><option value="Sapi" ${_hForm.jenis==="Sapi"?"selected":""}>🐄 Sapi</option><option value="Kambing" ${_hForm.jenis==="Kambing"?"selected":""}>🐐 Kambing</option></select></div>
      <div class="form-group"><label class="form-label">Nomor Hewan</label><input class="input" id="hf-nomor" value="${_hForm.nomorHewan}" oninput="_hForm.nomorHewan=this.value" placeholder="S-003"></div>
      <div class="form-group"><label class="form-label">Berat Hidup (kg)</label><input class="input" id="hf-berat" type="number" value="${_hForm.beratKg}" oninput="_hForm.beratKg=this.value" inputmode="decimal"></div>
      <div class="form-group"><label class="form-label">Est. Daging (kg)</label><input class="input" id="hf-daging" type="number" step="0.5" value="${_hForm.estimasiDaging}" oninput="_hForm.estimasiDaging=this.value" placeholder="Auto (60%/50%)" inputmode="decimal"></div>
    </div>
    <div style="display:flex;gap:10px;margin-top:10px">
      <button class="btn btn-primary btn-sm" onclick="saveHewan()">💾 Simpan</button>
      <button class="btn btn-secondary btn-sm" onclick="_showHewanForm=false;renderPage()">✖ Batal</button>
    </div>
  </div>`:"";
  const total_berat=STATE.hewan.reduce((s,h)=>s+h.beratKg,0);
  const total_daging=STATE.hewan.reduce((s,h)=>s+h.estimasiDaging,0);
  return `<div class="page">
    <div class="page-header"><span style="font-size:24px">🐄</span><div><h2>Data Hewan Qurban</h2><p>Manajemen hewan yang akan disembelih</p></div></div>
    <button class="btn btn-primary btn-sm" style="margin-bottom:12px" onclick="_showHewanForm=!_showHewanForm;renderPage()">➕ Tambah Hewan</button>
    ${formHTML}
    <div class="card"><div class="tbl-wrap"><table class="tbl">
      <thead><tr><th>No.</th><th>Jenis</th><th>Berat</th><th>Est. Daging</th></tr></thead>
      <tbody>
        ${STATE.hewan.map(h=>`<tr><td><strong>${h.nomorHewan}</strong></td><td>${h.jenis==="Sapi"?"🐄":"🐐"} ${h.jenis}</td><td>${h.beratKg} kg</td><td><strong>${h.estimasiDaging} kg</strong></td></tr>`).join("")}
        <tr style="background:#eff6ff;font-weight:700"><td colspan="2">TOTAL (${STATE.hewan.length} hewan)</td><td>${fmt(total_berat)} kg</td><td style="color:#dc2626">${fmt(total_daging)} kg</td></tr>
      </tbody>
    </table></div></div>
  </div>`;
}
function saveHewan(){
  _hForm.nomorHewan=document.getElementById("hf-nomor")?.value.trim()||_hForm.nomorHewan;
  _hForm.beratKg=document.getElementById("hf-berat")?.value||_hForm.beratKg;
  _hForm.estimasiDaging=document.getElementById("hf-daging")?.value||_hForm.estimasiDaging;
  if(!_hForm.nomorHewan||!_hForm.beratKg){showToast("Lengkapi data hewan!","error");return;}
  const est=_hForm.estimasiDaging||parseFloat(_hForm.beratKg)*(_hForm.jenis==="Sapi"?0.6:0.5);
  STATE.hewan.push({id:genId("H"),jenis:_hForm.jenis,nomorHewan:_hForm.nomorHewan,beratKg:parseFloat(_hForm.beratKg),estimasiDaging:parseFloat(est),status:"siap",createdAt:todayStr()});
  showToast("Hewan ditambahkan.");_showHewanForm=false;_hForm={jenis:"Sapi",nomorHewan:"",beratKg:"",estimasiDaging:""};renderPage();
}

// ================================================================
// PENGGUNA
// ================================================================
let _showPenggunaForm=false,_pForm={username:"",password:"",name:"",role:"pendataan",wilayah:""};
function renderPengguna(){
  const formHTML=_showPenggunaForm?`<div class="card" style="background:#f8fafc;border:1px solid #e2e8f0">
    <div class="card-title">Tambah Pengguna Baru</div>
    <div class="form-grid">
      <div class="form-group"><label class="form-label">Nama</label><input class="input" id="pf-nama" value="${_pForm.name}" oninput="_pForm.name=this.value"></div>
      <div class="form-group"><label class="form-label">Username</label><input class="input" id="pf-user" value="${_pForm.username}" oninput="_pForm.username=this.value" autocomplete="off"></div>
      <div class="form-group"><label class="form-label">Password</label><input class="input" id="pf-pass" type="password" value="${_pForm.password}" oninput="_pForm.password=this.value" autocomplete="new-password"></div>
      <div class="form-group"><label class="form-label">Role</label><select class="select" style="width:100%" onchange="_pForm.role=this.value;renderPage()"><option value="admin" ${_pForm.role==="admin"?"selected":""}>Admin</option><option value="pendataan" ${_pForm.role==="pendataan"?"selected":""}>Pendataan</option><option value="distribusi" ${_pForm.role==="distribusi"?"selected":""}>Distribusi</option><option value="viewer" ${_pForm.role==="viewer"?"selected":""}>Viewer</option></select></div>
      ${_pForm.role==="pendataan"?`<div class="form-group"><label class="form-label">Wilayah</label><input class="input" id="pf-wil" value="${_pForm.wilayah}" oninput="_pForm.wilayah=this.value" placeholder="RT 03/RW 01"></div>`:""}
    </div>
    <div style="display:flex;gap:10px;margin-top:10px">
      <button class="btn btn-primary btn-sm" onclick="savePengguna()">💾 Simpan</button>
      <button class="btn btn-secondary btn-sm" onclick="_showPenggunaForm=false;renderPage()">✖ Batal</button>
    </div>
  </div>`:"";
  return `<div class="page">
    <div class="page-header"><span style="font-size:24px">👤</span><div><h2>Manajemen Pengguna</h2><p>Kelola akun dan hak akses tim</p></div></div>
    <button class="btn btn-primary btn-sm" style="margin-bottom:12px" onclick="_showPenggunaForm=!_showPenggunaForm;renderPage()">➕ Tambah Pengguna</button>
    ${formHTML}
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px">
      ${STATE.users.map(u=>{const rc=ROLES[u.role];return`<div class="card" style="display:flex;align-items:center;gap:12px;margin-bottom:0">
        <div style="width:42px;height:42px;border-radius:50%;background:${rc.color};display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">${rc.icon}</div>
        <div style="flex:1"><div style="font-weight:700;font-size:14px">${u.name}</div><div style="font-size:12px;color:#94a3b8">@${u.username}</div>
        <div style="display:flex;gap:5px;margin-top:4px;flex-wrap:wrap">
          <span class="badge" style="background:${rc.color}22;color:${rc.color};border:1px solid ${rc.color}44;font-size:10px">${rc.label}</span>
          ${u.wilayah?`<span class="badge" style="background:#f1f5f9;color:#475569;border:1px solid #e2e8f0;font-size:10px">${u.wilayah}</span>`:""}
        </div></div>
      </div>`;}).join("")}
    </div>
  </div>`;
}
function savePengguna(){
  _pForm.name=document.getElementById("pf-nama")?.value.trim()||_pForm.name;
  _pForm.username=document.getElementById("pf-user")?.value.trim()||_pForm.username;
  _pForm.password=document.getElementById("pf-pass")?.value||_pForm.password;
  _pForm.wilayah=document.getElementById("pf-wil")?.value.trim()||_pForm.wilayah;
  if(!_pForm.name||!_pForm.username||!_pForm.password){showToast("Lengkapi data!","error");return;}
  if(STATE.users.find(u=>u.username===_pForm.username)){showToast("Username sudah digunakan!","error");return;}
  STATE.users.push({id:genId("U"),..._pForm});showToast("Pengguna ditambahkan.");
  _showPenggunaForm=false;_pForm={username:"",password:"",name:"",role:"pendataan",wilayah:""};renderPage();
}

// ================================================================
// LAPORAN
// ================================================================
function renderLaporan(){
  const m=STATE.mustahiq;
  const h=STATE.hewan;
  const dagingEst=h.reduce((s,x)=>s+x.estimasiDaging,0);
  const dagingDist=m.filter(x=>x.status==="sudah").reduce((s,x)=>s+x.jumlahKG,0);
  const dagingBelum=m.filter(x=>x.status==="belum").reduce((s,x)=>s+x.jumlahKG,0);
  const byKat=KATEGORI.reduce((acc,k)=>{const list=m.filter(x=>x.kategori===k);if(list.length)acc[k]={total:list.length,sudah:list.filter(x=>x.status==="sudah").length,kg:list.reduce((s,x)=>s+x.jumlahKG,0)};return acc;},{});
  const byWil=[...new Set(m.map(x=>x.wilayah))].map(w=>{const list=m.filter(x=>x.wilayah===w);return{wilayah:w,total:list.length,sudah:list.filter(x=>x.status==="sudah").length,kg:list.reduce((s,x)=>s+x.jumlahKG,0)};});
  return `<div class="page">
    <div class="page-header"><span style="font-size:24px">📊</span><div><h2>Laporan & Rekap</h2><p>Ringkasan pelaksanaan distribusi qurban</p></div></div>
    <div class="stat-grid">
      <div class="stat-card" style="color:#7c3aed"><div class="stat-icon">🥩</div><div class="stat-val" style="color:#7c3aed">${fmt(dagingEst)} kg</div><div class="stat-lbl">Est. Daging Total</div></div>
      <div class="stat-card" style="color:#16a34a"><div class="stat-icon">✅</div><div class="stat-val" style="color:#16a34a">${fmt(dagingDist)} kg</div><div class="stat-lbl">Sudah Distribusi</div></div>
      <div class="stat-card" style="color:#d97706"><div class="stat-icon">⏳</div><div class="stat-val" style="color:#d97706">${fmt(dagingBelum)} kg</div><div class="stat-lbl">Belum Distribusi</div></div>
      <div class="stat-card" style="color:#2563eb"><div class="stat-icon">🎫</div><div class="stat-val" style="color:#2563eb">${m.filter(x=>x.kuponCetak).length}</div><div class="stat-lbl">Kupon Tercetak</div></div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-bottom:12px">
      <div class="card"><div class="card-title">📊 Per Kategori Asnaf</div><div class="tbl-wrap"><table class="tbl"><thead><tr><th>Kategori</th><th>Total</th><th>Sudah</th><th>(kg)</th></tr></thead><tbody>
        ${Object.entries(byKat).map(([k,v])=>`<tr><td><span class="badge" style="background:#dbeafe;color:#1d4ed8;font-size:10px">${k}</span></td><td>${v.total}</td><td><span style="color:#16a34a">${v.sudah}</span>/${v.total}</td><td>${v.kg} kg</td></tr>`).join("")}
      </tbody></table></div></div>
      <div class="card"><div class="card-title">🗺️ Per Wilayah</div><div class="tbl-wrap"><table class="tbl"><thead><tr><th>Wilayah</th><th>Total</th><th>Sudah</th><th>(kg)</th></tr></thead><tbody>
        ${byWil.map(w=>`<tr><td><strong style="font-size:12px">${w.wilayah}</strong></td><td>${w.total}</td><td><span style="color:#16a34a">${w.sudah}</span>/${w.total}</td><td>${w.kg} kg</td></tr>`).join("")}
      </tbody></table></div></div>
    </div>
    <div class="card"><div class="card-title">📋 Daftar Lengkap Mustahiq</div><div class="tbl-wrap"><table class="tbl"><thead><tr><th>No</th><th>Nama</th><th>Wilayah</th><th>Kode Kupon</th><th>Jatah</th><th>Cetak</th><th>Status</th></tr></thead><tbody>
      ${m.map((x,i)=>`<tr><td>${i+1}</td><td><strong style="font-size:12px">${x.nama}</strong></td><td style="font-size:11px">${x.wilayah}</td><td><code style="font-size:10px;color:#7c3aed;font-weight:700">${x.kuponKode}</code></td><td>${x.jumlahKG} kg</td><td><span class="badge" style="background:${x.kuponCetak?"#f3e8ff":"#f1f5f9"};color:${x.kuponCetak?"#7c3aed":"#94a3b8"};font-size:10px">${x.kuponCetak?"🖨️":"⬜"}</span></td><td><span class="badge" style="background:${x.status==="sudah"?"#dcfce7":"#fef3c7"};color:${x.status==="sudah"?"#16a34a":"#d97706"};font-size:10px">${x.status==="sudah"?"✅ Sudah":"⏳ Belum"}</span></td></tr>`).join("")}
    </tbody></table></div></div>
  </div>`;
}

// ================================================================
// INIT
// ================================================================
render();
</script>
</body>
</html>
