<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#f1f5f9;--white:#fff;--slate900:#0f172a;--slate800:#1e293b;
    --slate700:#334155;--slate500:#64748b;--slate400:#94a3b8;--slate200:#e2e8f0;--slate100:#f1f5f9;
    --blue600:#2563eb;--blue50:#eff6ff;
    --green600:#16a34a;--green50:#f0fdf4;
    --red600:#dc2626;--red50:#fef2f2;
    --amber600:#d97706;--amber50:#fffbeb;
    --purple600:#7c3aed;--purple50:#f5f3ff;
    --font:"Segoe UI",system-ui,sans-serif;
    --nav-h:64px;
  }
  html,body{height:100%;background:var(--bg);font-family:var(--font);color:var(--slate800)}
  #root{height:100%}
  button{font-family:var(--font);cursor:pointer}
  input,select{font-family:var(--font)}
  input:focus,select:focus{outline:2px solid var(--blue600);outline-offset:1px}
  ::-webkit-scrollbar{width:4px;height:4px}
  ::-webkit-scrollbar-thumb{background:var(--slate200);border-radius:4px}

  /* ── LAYOUT ── */
  .app{display:flex;height:100%;position:relative;overflow:hidden}

  /* Desktop sidebar */
  .sidebar{width:256px;background:var(--slate900);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100%;z-index:200;overflow-y:auto;transition:transform .25s}
  .main{margin-left:256px;flex:1;height:100%;overflow-y:auto;padding-bottom:0}
  .page{padding:20px;max-width:900px;margin:0 auto}

  /* Mobile: hide sidebar, show bottom nav */
  @media(max-width:768px){
    .sidebar{transform:translateX(-100%)}
    .sidebar.open{transform:translateX(0)}
    .sidebar-overlay{display:block}
    .main{margin-left:0;padding-bottom:var(--nav-h)}
    .bottom-nav{display:flex}
  }
  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:190}
  .bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--slate900);border-top:1px solid var(--slate800);z-index:200;align-items:stretch}
  .bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:var(--slate400);font-size:10px;font-weight:600;padding:8px 4px;transition:all .15s;min-width:0}
  .bn-item.active{color:var(--purple600)}
  .bn-item .bn-icon{font-size:20px}
  .bn-label{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:56px}

  /* ── SIDEBAR CONTENT ── */
  .logo-area{padding:18px 16px 12px;border-bottom:1px solid var(--slate800);display:flex;align-items:center;gap:10}
  .logo-title{font-size:18px;font-weight:900;color:#f8fafc;letter-spacing:1px}
  .logo-sub{font-size:10px;color:var(--slate500)}
  .user-badge{margin:12px;padding:10px 12px;border-radius:8px;border:1px solid;display:flex;align-items:center;gap:10}
  .role-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
  .nav-area{padding:8px;flex:1}
  .nav-btn{width:100%;background:none;border:none;color:var(--slate400);padding:9px 14px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:10;font-size:13px;text-align:left;margin-bottom:2px;transition:all .15s;font-weight:400}
  .nav-btn.active{background:var(--slate800);color:#f8fafc;font-weight:700}
  .logout-btn{margin:12px;padding:10px;background:rgba(220,38,38,.13);color:#f87171;border:1px solid rgba(220,38,38,.27);border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;width:calc(100% - 24px)}
  .menu-toggle{display:none;background:none;border:none;color:#f8fafc;font-size:24px;padding:8px;cursor:pointer}
  @media(max-width:768px){.menu-toggle{display:block}}

  /* ── MOBILE TOP BAR ── */
  .topbar{display:none;background:var(--slate900);color:#f8fafc;padding:0 16px;height:52px;align-items:center;gap:12;position:sticky;top:0;z-index:150}
  @media(max-width:768px){.topbar{display:flex}}
  .topbar-title{font-weight:800;font-size:16px;flex:1;text-align:center}
  .topbar-right{width:40px;display:flex;justify-content:flex-end}

  /* ── CARDS & COMMON ── */
  .card{background:var(--white);border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
  .card-title{font-size:14px;font-weight:700;color:var(--slate800);margin:0 0 12px}
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px}
  .stat-card{background:var(--white);border-radius:12px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.07);border-left:4px solid currentColor}
  .stat-icon{font-size:22px;margin-bottom:4px}
  .stat-val{font-size:20px;font-weight:800}
  .stat-lbl{font-size:11px;color:var(--slate400);margin-top:2px}
  .page-header{display:flex;align-items:center;gap:12px;margin-bottom:18px;padding-bottom:14px;border-bottom:2px solid var(--slate200)}
  .page-header h2{margin:0;font-size:18px;font-weight:800;color:var(--slate800)}
  .page-header p{margin:0;color:var(--slate400);font-size:12px}
  .badge{display:inline-flex;align-items:center;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:600;white-space:nowrap}
  .btn{border:none;padding:9px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;display:inline-flex;align-items:center;gap:6px;transition:opacity .15s}
  .btn:active{opacity:.8}
  .btn-primary{background:var(--blue600);color:#fff}
  .btn-green{background:var(--green600);color:#fff}
  .btn-purple{background:var(--purple600);color:#fff}
  .btn-red{background:var(--red600);color:#fff}
  .btn-secondary{background:var(--slate100);color:var(--slate700);border:1px solid var(--slate200)}
  .btn-sm{padding:6px 12px;font-size:12px;border-radius:6px}
  .btn-icon{background:var(--blue50);color:var(--blue600);border:none;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:14px}
  .input{padding:9px 12px;border:1px solid var(--slate200);border-radius:8px;font-size:14px;width:100%;font-family:var(--font);background:var(--white)}
  .input:focus{outline:2px solid var(--blue600)}
  .select{padding:9px 12px;border:1px solid var(--slate200);border-radius:8px;font-size:14px;font-family:var(--font);background:var(--white)}
  .form-group{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
  .form-label{font-size:12px;font-weight:600;color:var(--slate500)}

// ================================================================
// QR SVG — menggunakan qrcode-generator (QR nyata, bisa di-scan)
// ================================================================
function qrSVG(text,sz){
  sz=sz||120;
  try{
    if(typeof qrcode==="undefined") throw new Error("lib not loaded");
    // qrcode-generator: typeNumber=0 (auto), errorCorrectionLevel='M'
    const qr=qrcode(0,'M');
    qr.addData(text);
    qr.make();
    const mc=qr.getModuleCount();
    // QR spec requires minimum 4-module quiet zone on all sides
    const quiet=4;
    const totalModules=mc+quiet*2;
    const cellSize=sz/totalModules;
    const offset=quiet*cellSize;
    let rects='';
    for(let r=0;r<mc;r++){
      for(let c=0;c<mc;c++){
        if(qr.isDark(r,c)){
          const x=(offset+c*cellSize).toFixed(3);
          const y=(offset+r*cellSize).toFixed(3);
          const s=cellSize.toFixed(3);
          rects+=`<rect x="${x}" y="${y}" width="${s}" height="${s}"/>`;
        }
      }
    }
    return `<svg width="${sz}" height="${sz}" style="display:block;border-radius:4px" viewBox="0 0 ${sz} ${sz}" xmlns="http://www.w3.org/2000/svg"><rect width="${sz}" height="${sz}" fill="white"/><g fill="#1e293b">${rects}</g></svg>`;
  }catch(e){
    // Fallback jika library belum load
    return `<svg width="${sz}" height="${sz}" style="display:block;border-radius:4px"><rect width="${sz}" height="${sz}" fill="#f1f5f9"/><text x="${sz/2}" y="${sz/2+4}" text-anchor="middle" font-size="9" fill="#94a3b8" font-family="monospace">QR Error</text></svg>`;
  }
}

// ================================================================
// BARCODE SVG — Code 39 (standar industri, bisa di-scan)
// Mendukung: A-Z, 0-9, - . SPACE $ / + %
// Kode kupon QRB-XXXXX-XXX valid untuk Code 39
// ================================================================
function barcodeSVG(text,w,h){
  w=w||240;h=h||44;
  // Pola Code 39: 9 bit, alternating bar/space, 0=narrow, 1=wide
  const C39={
    '0':'000110100','1':'100100001','2':'001100001','3':'101100000',
    '4':'000110001','5':'100110000','6':'001110000','7':'000100101',
    '8':'100100100','9':'001100100','A':'100001001','B':'001001001',
    'C':'101001000','D':'000011001','E':'100011000','F':'001011000',
    'G':'000001101','H':'100001100','I':'001001100','J':'000011100',
    'K':'100000011','L':'001000011','M':'101000010','N':'000010011',
    'O':'100010010','P':'001010010','Q':'000000111','R':'100000110',
    'S':'001000110','T':'000010110','U':'110000001','V':'011000001',
    'W':'111000000','X':'010010001','Y':'110010000','Z':'011010000',
    '-':'010000101','.':'110000100',' ':'011000100','$':'010101000',
    '/':'010100010','+':'010001010','%':'000101010','*':'010010100'
  };
  const str=('*'+text.toUpperCase()+'*');
  // Validasi: pastikan semua karakter ada di C39
  for(const ch of str){if(!C39[ch])return _barcodeFallback(text,w,h);}
  // Hitung total unit: narrow=1, wide=3; antar karakter ada 1 unit gap
  let totalUnits=0;
  for(const ch of str){
    totalUnits+=[...C39[ch]].reduce((s,b)=>s+(b==='1'?3:1),0)+1; // +1 inter-char gap
  }
  totalUnits--; // tidak ada gap setelah karakter terakhir
  const unit=(w-12)/totalUnits;
  let x=6,bars='';
  for(let i=0;i<str.length;i++){
    const pat=C39[str[i]];
    let isBar=true;
    for(const bit of pat){
      const bw=bit==='1'?unit*3:unit;
      if(isBar)bars+=`<rect x="${x.toFixed(2)}" y="4" width="${Math.max(bw,0.5).toFixed(2)}" height="${h-8}"/>`;
      x+=bw;isBar=!isBar;
    }
    if(i<str.length-1)x+=unit; // inter-character gap
  }
  return `<svg width="${w}" height="${h}" style="display:block"><rect width="${w}" height="${h}" fill="white" rx="3"/><g fill="#1e293b">${bars}</g></svg>`;
}

function _barcodeFallback(text,w,h){
  // Jika ada karakter yang tidak valid untuk Code 39, tampilkan teks saja
  return `<svg width="${w}" height="${h}" style="display:block"><rect width="${w}" height="${h}" fill="#f8fafc" rx="3"/><text x="${w/2}" y="${h/2+5}" text-anchor="middle" font-size="13" font-family="monospace" font-weight="700" fill="#1e293b">${text}</text></svg>`;
}

function doDistribute(m){

  if(idx>=0)STATE.mustahiq[idx]={...STATE.mustahiq[idx],status:"sudah",distribusiId:rec.id};
  STATE.scanLog.unshift(rec);
  saveData();
  return rec;
}

// ================================================================
// CAMERA SCANNER — BarcodeDetector (native) → jsQR (CDN fallback)
// ================================================================
let _camActive=false,_animFrame=null,_stream=null,_lastScanMs=0;
let _barcodeDetector=null;
const SCAN_INTERVAL_MS=200;

// Initialise native BarcodeDetector once at startup (Chrome Android 83+)
(async function _initDetector(){
  if(typeof BarcodeDetector==="undefined")return;
  try{
    const supported=await BarcodeDetector.getSupportedFormats();
    const want=["qr_code","code_39","code_128","ean_13","ean_8","pdf417"].filter(f=>supported.includes(f));
    _barcodeDetector=new BarcodeDetector({formats:want.length?want:["qr_code"]});
  }catch(e){_barcodeDetector=null;}
})();

async function startCamera(){
  const vid=document.getElementById("scan-video");
  const canv=document.getElementById("scan-canvas");
  if(!vid||!canv)return;
  stopCamera();
  _setScannerStatus("⏳ Memulai kamera...");

  const constraintsList=[
    {video:{facingMode:{exact:STATE.camFacing},width:{ideal:1280},height:{ideal:720}}},
    {video:{facingMode:STATE.camFacing,width:{ideal:640},height:{ideal:480}}},
    {video:{facingMode:STATE.camFacing}},
    {video:true}
  ];

  let stream=null;
  for(const c of constraintsList){
    try{stream=await navigator.mediaDevices.getUserMedia(c);break;}
    catch(e){continue;}
  }
  if(!stream){
    _setScannerStatus("❌ Kamera tidak dapat diakses. Periksa izin kamera di browser.");
    return;
  }

  _stream=stream;
  vid.srcObject=stream;
  vid.setAttribute("playsinline","true");
  vid.setAttribute("muted","true");
  try{await vid.play();}
  catch(e){_setScannerStatus("❌ Video gagal diputar: "+e.message);return;}

  _camActive=true;
  _lastScanMs=0;

  if(_barcodeDetector){
    _setScannerStatus("📷 Scanner aktif — arahkan QR code ke kotak");
    _animFrame=requestAnimationFrame((ts)=>_tickNative(vid,ts));
  }else if(typeof jsQR!=="undefined"){
    _setScannerStatus("📷 Arahkan QR code ke dalam kotak...");
    _animFrame=requestAnimationFrame((ts)=>_tickJsQR(vid,canv,ts));
  }else{
    _setScannerStatus("⚠️ Scanner tidak tersedia. Refresh dengan koneksi internet, atau gunakan mode Manual/Daftar.");
  }
}

function stopCamera(){
  _camActive=false;
  if(_animFrame){cancelAnimationFrame(_animFrame);_animFrame=null;}
  if(_stream){_stream.getTracks().forEach(t=>t.stop());_stream=null;}
}

function _setScannerStatus(msg){
  const el=document.getElementById("scanner-status");
  if(el)el.textContent=msg;
}

// ── Engine 1: BarcodeDetector (native Chrome/Android, no CDN) ──
async function _tickNative(vid,timestamp){
  if(!_camActive)return;
  if(timestamp-_lastScanMs<SCAN_INTERVAL_MS){
    _animFrame=requestAnimationFrame((ts)=>_tickNative(vid,ts));
    return;
  }
  _lastScanMs=timestamp;
  try{
    if(vid.readyState>=vid.HAVE_ENOUGH_DATA){
      const results=await _barcodeDetector.detect(vid);
      if(!_camActive)return;
      if(results&&results.length>0&&results[0].rawValue){
        _handleScannedCode(results[0].rawValue.trim().toUpperCase());
        return;
      }
    }
  }catch(e){console.warn("BarcodeDetector err:",e);}
  if(_camActive)_animFrame=requestAnimationFrame((ts)=>_tickNative(vid,ts));
}

// ── Engine 2: jsQR (CDN fallback for older browsers) ──
function _tickJsQR(vid,canv,timestamp){
  if(!_camActive)return;
  if(vid.readyState<vid.HAVE_ENOUGH_DATA){
    _animFrame=requestAnimationFrame((ts)=>_tickJsQR(vid,canv,ts));return;
  }
  if(timestamp-_lastScanMs<SCAN_INTERVAL_MS){
    _animFrame=requestAnimationFrame((ts)=>_tickJsQR(vid,canv,ts));return;
  }
  _lastScanMs=timestamp;
  try{
    const scale=Math.min(1,640/vid.videoWidth);
    const sw=Math.max(1,Math.floor(vid.videoWidth*scale));
    const sh=Math.max(1,Math.floor(vid.videoHeight*scale));
    canv.width=sw;canv.height=sh;
    const ctx=canv.getContext("2d",{willReadFrequently:true});
    ctx.drawImage(vid,0,0,sw,sh);
    const img=ctx.getImageData(0,0,sw,sh);
    const code=jsQR(img.data,sw,sh,{inversionAttempts:"attemptBoth"});
    if(code&&code.data&&code.data.trim()){
      _handleScannedCode(code.data.trim().toUpperCase());
      return;
    }
  }catch(e){console.warn("jsQR err:",e);}
  if(_camActive)_animFrame=requestAnimationFrame((ts)=>_tickJsQR(vid,canv,ts));
}

function _handleScannedCode(kode){
  stopCamera();

  // Feedback getar jika browser mendukung
  if(navigator.vibrate)navigator.vibrate(60);

  const target=STATE.mustahiq.find(m=>m.kuponKode===kode);

  if(!target){
    STATE.scanResult={status:"notfound",kode};
    STATE.confirmPending=null;
    _setScannerStatus("❌ Kupon tidak ditemukan");
    renderPage();
    showToast("Kupon tidak ditemukan: "+kode,"error");
    // Setelah 2 detik: bersihkan result agar scanner container muncul kembali
    setTimeout(()=>{
      if(STATE.page==="distribusi"&&STATE.scanMode==="camera"&&!STATE.confirmPending){
        STATE.scanResult=null;
        renderPage();
        // afterRender akan panggil startCamera via setTimeout(100)
      }
    },2000);
    return;
  }

  if(target.status==="sudah"){
    STATE.scanResult={status:"used",mustahiq:target};
    STATE.confirmPending=null;
    renderPage();
    showToast(target.nama+" sudah mengambil daging!","warn");
    if(navigator.vibrate)navigator.vibrate([60,80,60]);
    setTimeout(()=>{
      if(STATE.page==="distribusi"&&STATE.scanMode==="camera"&&!STATE.confirmPending){
        STATE.scanResult=null;
        renderPage();
      }
    },2500);
    return;
  }

  // Berhasil — tampilkan konfirmasi
  if(navigator.vibrate)navigator.vibrate([60,50,120]);
  STATE.confirmPending=target;
  STATE.scanResult=null;
  renderPage();
}

// Tetap expose handleScannedCode untuk tap manual di UI
function handleScannedCode(kode){_handleScannedCode(kode);}

function afterRender(){
  if(STATE.user&&STATE.page==="distribusi"&&STATE.scanMode==="camera"){
    const vid=document.getElementById("scan-video");
    // Hanya mulai kamera jika elemen video ada di DOM dan kamera belum aktif

        if(document.getElementById("scan-video")&&!_camActive)startCamera();
      },120);
    }

function doLogin(){
  const u=(document.getElementById("li-user").value||"").trim();
  const p=document.getElementById("li-pass").value||"";
  const errEl=document.getElementById("li-err");
  if(!u||!p){if(errEl){errEl.textContent="❌ Username dan password wajib diisi.";errEl.style.display="block";}return;}
  const found=STATE.users.find(x=>x.username===u&&x.password===p);
  if(found){

      ${myQ.length>5?`<div style="font-size:11px;color:#94a3b8;text-align:center;margin-top:8px">... dan ${myQ.length-5} lainnya</div>`:""}
    </div>`:""}
  </div>`;
}

// ================================================================
let _editMustahiqId=null,_showMustahiqForm=false;
let _mForm={nama:"",nik:"",alamat:"",wilayah:"",kategori:"fakir",jumlahKG:1};

function renderMustahiq(){
  const isAdmin=STATE.user.role==="admin";
  const myMustahiq=STATE.user.role==="pendataan"?STATE.mustahiq.filter(m=>m.wilayah===STATE.user.wilayah):STATE.mustahiq;
  const filtered=myMustahiq.filter(m=>{
    const q=STATE.mustahiqSearch.toLowerCase();
    const ms=m.nama.toLowerCase().includes(q)||m.nik.includes(STATE.mustahiqSearch)||m.kuponKode.includes(STATE.mustahiqSearch.toUpperCase());
    const st=STATE.mustahiqFilter==="semua"||m.status===STATE.mustahiqFilter;
    const kt=STATE.mustahiqFilterKat==="semua"||m.kategori===STATE.mustahiqFilterKat;
    return ms&&st&&kt;
  });

  // ── Pagination ──
  const perPage=STATE.mustahiqPerPage;
  const totalPages=Math.max(1,Math.ceil(filtered.length/perPage));
  if(STATE.mustahiqPage>=totalPages)STATE.mustahiqPage=totalPages-1;
  const pageStart=STATE.mustahiqPage*perPage;
  const pageRows=filtered.slice(pageStart,pageStart+perPage);

  const allWilayah=[...new Set(STATE.mustahiq.map(m=>m.wilayah).filter(Boolean))].sort();
  const formHTML=_showMustahiqForm?`<div class="card" style="background:#f8fafc;border:1px solid #e2e8f0">
    <datalist id="wil-list">${allWilayah.map(w=>`<option value="${w}">`).join("")}</datalist>
    <div class="card-title">${_editMustahiqId?"✏️ Edit":"➕ Tambah"} Mustahiq</div>
    <div class="form-grid">
      <div class="form-group"><label class="form-label">Nama Lengkap *</label><input class="input" id="mf-nama" value="${_mForm.nama}" oninput="_mForm.nama=this.value" placeholder="Nama lengkap" autofocus></div>
      <div class="form-group">
        <label class="form-label" style="display:flex;justify-content:space-between">
          <span>NIK (16 digit) *</span>
          <span id="nik-counter" style="color:${_mForm.nik.length===16?"#16a34a":"#d97706"};font-weight:700">${_mForm.nik.length}/16</span>
        </label>
        <input class="input" id="mf-nik" value="${_mForm.nik}" oninput="_mForm.nik=this.value.replace(/\\D/g,'').slice(0,16);this.value=_mForm.nik;const c=document.getElementById('nik-counter');if(c){c.textContent=_mForm.nik.length+'/16';c.style.color=_mForm.nik.length===16?'#16a34a':'#d97706'}" placeholder="16 digit NIK" inputmode="numeric" maxlength="16">
      </div>
      <div class="form-group"><label class="form-label">Alamat *</label><input class="input" id="mf-alamat" value="${_mForm.alamat}" oninput="_mForm.alamat=this.value" placeholder="Alamat lengkap"></div>
      <div class="form-group"><label class="form-label">Wilayah/RT-RW *</label><input class="input" id="mf-wilayah" value="${_mForm.wilayah}" list="wil-list" oninput="_mForm.wilayah=this.value" placeholder="RT 01/RW 02" ${STATE.user.role==="pendataan"?"readonly":""}></div>
      <div class="form-group"><label class="form-label">Kategori</label><select class="select" style="width:100%" onchange="_mForm.kategori=this.value;_mForm.jumlahKG=JATAH[this.value]||1;document.getElementById('mf-jatah').value=_mForm.jumlahKG">${KATEGORI.map(k=>`<option value="${k}" ${_mForm.kategori===k?"selected":""}>${k.charAt(0).toUpperCase()+k.slice(1)}</option>`).join("")}</select></div>
      <div class="form-group"><label class="form-label">Jatah Daging (kg)</label><input class="input" id="mf-jatah" type="number" step="0.5" min="0.5" value="${_mForm.jumlahKG}" oninput="_mForm.jumlahKG=parseFloat(this.value)||1" inputmode="decimal"></div>
    </div>
    <div style="display:flex;gap:10px;margin-top:12px">
      <button class="btn btn-primary btn-sm" onclick="saveMustahiq()">💾 Simpan</button>
      <button class="btn btn-secondary btn-sm" onclick="_showMustahiqForm=false;_editMustahiqId=null;renderPage()">✖ Batal</button>
    </div>
  </div>`:"";

  const rows=pageRows.map((m,i)=>`<tr>
    <td style="color:#94a3b8;font-size:11px">${pageStart+i+1}</td>
    <td><strong style="font-size:13px">${m.nama}</strong><div style="font-size:10px;color:#94a3b8">${m.wilayah} &bull; <span class="badge" style="background:#dbeafe;color:#1d4ed8;font-size:9px;padding:1px 5px">${m.kategori}</span></div></td>
    <td><code style="font-size:10px;color:#7c3aed;font-weight:700">${m.kuponKode}</code></td>
    <td><span class="badge" style="background:${m.status==="sudah"?"#dcfce7":"#fef3c7"};color:${m.status==="sudah"?"#16a34a":"#d97706"}">${m.status==="sudah"?"✅ Sudah":"⏳ Belum"}</span></td>
    <td><div style="display:flex;gap:4px">
      <button class="btn-icon btn-sm" title="Edit" onclick="editMustahiq('${m.id}')">✏️</button>
      ${isAdmin?`<button style="background:#fef2f2;color:#dc2626;border:none;padding:5px 8px;border-radius:6px;cursor:pointer;font-size:12px" title="Hapus" onclick="delMustahiq('${m.id}')">🗑️</button>`:""}
    </div></td>
  </tr>`).join("");

  // ── Pagination controls ──
  const pagBtns=Array.from({length:totalPages},(_,i)=>`<button onclick="STATE.mustahiqPage=${i};renderPage()" style="padding:5px 10px;border-radius:6px;border:1px solid ${STATE.mustahiqPage===i?"#2563eb":"#e2e8f0"};background:${STATE.mustahiqPage===i?"#2563eb":"#fff"};color:${STATE.mustahiqPage===i?"#fff":"#475569"};cursor:pointer;font-size:12px;font-weight:600">${i+1}</button>`).join("");

  const paginationHTML=totalPages>1?`<div style="display:flex;align-items:center;gap:6px;margin-top:12px;flex-wrap:wrap">
    <button onclick="STATE.mustahiqPage=Math.max(0,STATE.mustahiqPage-1);renderPage()" ${STATE.mustahiqPage===0?"disabled":""} style="padding:5px 10px;border-radius:6px;border:1px solid #e2e8f0;background:#fff;cursor:pointer;font-size:12px;color:#475569">◀</button>
    ${pagBtns}
    <button onclick="STATE.mustahiqPage=Math.min(${totalPages-1},STATE.mustahiqPage+1);renderPage()" ${STATE.mustahiqPage===totalPages-1?"disabled":""} style="padding:5px 10px;border-radius:6px;border:1px solid #e2e8f0;background:#fff;cursor:pointer;font-size:12px;color:#475569">▶</button>
    <span style="font-size:11px;color:#94a3b8;margin-left:4px">Hal ${STATE.mustahiqPage+1} dari ${totalPages} &bull; ${filtered.length} data</span>
  </div>`:`<div style="font-size:11px;color:#94a3b8;margin-top:8px">${filtered.length} dari ${myMustahiq.length} mustahiq</div>`;

  return `<div class="page">
    <div class="page-header"><span style="font-size:24px">👥</span><div><h2>Data Mustahiq</h2><p>Pendataan penerima daging qurban</p></div></div>
    <div class="toolbar">
      <div class="search-box"><span>🔍</span><input class="search-input" value="${STATE.mustahiqSearch}" oninput="STATE.mustahiqSearch=this.value;STATE.mustahiqPage=0;renderPage()" placeholder="Cari nama, NIK, atau kode kupon..."></div>
      <select class="select" onchange="STATE.mustahiqFilter=this.value;STATE.mustahiqPage=0;renderPage()">
        <option value="semua" ${STATE.mustahiqFilter==="semua"?"selected":""}>Semua Status</option>
        <option value="belum" ${STATE.mustahiqFilter==="belum"?"selected":""}>Belum Distribusi</option>
        <option value="sudah" ${STATE.mustahiqFilter==="sudah"?"selected":""}>Sudah Distribusi</option>
      </select>
      <select class="select" onchange="STATE.mustahiqFilterKat=this.value;STATE.mustahiqPage=0;renderPage()">
        <option value="semua" ${STATE.mustahiqFilterKat==="semua"?"selected":""}>Semua Kategori</option>
        ${KATEGORI.map(k=>`<option value="${k}" ${STATE.mustahiqFilterKat===k?"selected":""}>${k.charAt(0).toUpperCase()+k.slice(1)}</option>`).join("")}
      </select>
      <select class="select" onchange="STATE.mustahiqPerPage=parseInt(this.value);STATE.mustahiqPage=0;renderPage()">
        <option value="10" ${STATE.mustahiqPerPage===10?"selected":""}>10/hal</option>
        <option value="25" ${STATE.mustahiqPerPage===25?"selected":""}>25/hal</option>
        <option value="50" ${STATE.mustahiqPerPage===50?"selected":""}>50/hal</option>
      </select>
    </div>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap">
      <button class="btn btn-primary btn-sm" onclick="openAddMustahiq()">➕ Tambah Mustahiq</button>
      ${(STATE.mustahiqSearch||STATE.mustahiqFilter!=="semua"||STATE.mustahiqFilterKat!=="semua")?`<button class="btn btn-secondary btn-sm" onclick="STATE.mustahiqSearch='';STATE.mustahiqFilter='semua';STATE.mustahiqFilterKat='semua';STATE.mustahiqPage=0;renderPage()">✖ Reset Filter</button><span style="font-size:12px;color:#d97706;font-weight:600">${filtered.length} hasil filter</span>`:""}
    </div>
    ${formHTML}
    <div class="card">
      <div class="tbl-wrap"><table class="tbl"><thead><tr><th>No</th><th>Nama &amp; Kategori</th><th>Kupon</th><th>Status</th><th>Aksi</th></tr></thead>
      <tbody>${filtered.length===0?`<tr><td colspan="5" style="text-align:center;color:#94a3b8;padding:24px">Tidak ada data sesuai filter</td></tr>`:rows}</tbody></table></div>
      ${paginationHTML}
    </div>
  </div>`;
}

function openAddMustahiq(){
  _mForm={nama:"",nik:"",alamat:STATE.user.wilayah?"":_mForm.alamat,wilayah:STATE.user.wilayah||"",kategori:"fakir",jumlahKG:1};
  _editMustahiqId=null;_showMustahiqForm=true;renderPage();
}

function editMustahiq(id){
  const m=STATE.mustahiq.find(x=>x.id===id);if(!m)return;
  if(m.status==="sudah"){showToast("Sudah distribusi, tidak bisa diedit.","error");return;}
  if(STATE.user.role!=="admin"&&m.petugasId!==STATE.user.id){showToast("Anda hanya bisa edit data sendiri.","error");return;}
  _mForm={nama:m.nama,nik:m.nik,alamat:m.alamat,wilayah:m.wilayah,kategori:m.kategori,jumlahKG:m.jumlahKG};
  _editMustahiqId=id;_showMustahiqForm=true;renderPage();
}

function saveMustahiq(){
  const getV=(id)=>{const el=document.getElementById(id);return el?el.value.trim():""};
  _mForm.nama=getV("mf-nama")||_mForm.nama;
  _mForm.nik=getV("mf-nik").replace(/\D/g,"")||_mForm.nik;
  _mForm.alamat=getV("mf-alamat")||_mForm.alamat;
  _mForm.wilayah=getV("mf-wilayah")||_mForm.wilayah;
  if(!_mForm.nama.trim()){showToast("Nama wajib diisi!","error");return;}
  if(_mForm.nama.trim().length<3){showToast("Nama minimal 3 karakter!","error");return;}
  if(!_mForm.nik){showToast("NIK wajib diisi!","error");return;}
  if(!/^\d{16}$/.test(_mForm.nik)){showToast("NIK harus tepat 16 digit angka!","error");return;}
  if(!_mForm.alamat.trim()){showToast("Alamat wajib diisi!","error");return;}
  if(!_mForm.wilayah.trim()){showToast("Wilayah wajib diisi!","error");return;}
  const dup=STATE.mustahiq.find(m=>m.nik===_mForm.nik&&m.id!==_editMustahiqId);
  if(dup){showToast("NIK sudah terdaftar atas nama "+dup.nama+"!","error");return;}
  if(_editMustahiqId){
    const idx=STATE.mustahiq.findIndex(m=>m.id===_editMustahiqId);
    if(idx>=0)STATE.mustahiq[idx]={...STATE.mustahiq[idx],..._mForm,jumlahKG:parseFloat(_mForm.jumlahKG)};
    showToast("Data mustahiq diperbarui.");
  } else {
    const nid=genId("M");
    STATE.mustahiq.push({id:nid,..._mForm,jumlahKG:parseFloat(_mForm.jumlahKG),status:"belum",petugasId:STATE.user.id,tanggal:todayStr(),distribusiId:null,kuponKode:makeKode(nid),kuponCetak:false});
    showToast("Mustahiq ditambahkan — kupon otomatis digenerate.");
  }
  saveData();
  _showMustahiqForm=false;_editMustahiqId=null;renderPage();
}

function delMustahiq(id){
  const m=STATE.mustahiq.find(x=>x.id===id);if(!m)return;
  if(m.status==="sudah"){showToast("Tidak bisa hapus — sudah didistribusi.","error");return;}
  openModal("Hapus Mustahiq","Hapus data "+m.nama+"?","Ya, Hapus",true,()=>{
    STATE.mustahiq=STATE.mustahiq.filter(x=>x.id!==id);saveData();showToast("Data dihapus.","error");renderPage();
  });
}

// ================================================================
// KUPON
// ================================================================
function renderKupon(){
  const myMustahiq=STATE.user.role==="pendataan"?STATE.mustahiq.filter(m=>m.wilayah===STATE.user.wilayah):STATE.mustahiq;
  const wilayahs=[...new Set(myMustahiq.map(m=>m.wilayah))];
  const filtered=myMustahiq.filter(m=>{
    const ms=m.nama.toLowerCase().includes(STATE.kuponSearch.toLowerCase())||m.kuponKode.includes(STATE.kuponSearch.toUpperCase());
    const mw=STATE.kuponFilterW==="semua"||m.wilayah===STATE.kuponFilterW;
    const mc=STATE.kuponFilterC==="semua"||(STATE.kuponFilterC==="cetak"?m.kuponCetak:!m.kuponCetak);
    return ms&&mw&&mc;
  });
  const belumCetak=filtered.filter(m=>!m.kuponCetak).length;

  const cards=filtered.map(m=>`<div style="margin-bottom:16px">
    <div style="overflow-x:auto">${kuponHTML(m,false)}</div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn btn-secondary btn-sm" style="flex:1" onclick="previewKupon('${m.id}')">🔍 Preview</button>
      <button class="btn btn-sm" style="flex:1;background:${m.kuponCetak?"#475569":"#7c3aed"};color:#fff" onclick="printKupon('${m.id}')">🖨️ ${m.kuponCetak?"Cetak Ulang":"Cetak"}</button>
    </div>
  </div>`).join("");

  return `<div class="page">
    <div class="page-header"><span style="font-size:24px">🎫</span><div><h2>Kelola Kupon</h2><p>Generate, preview, dan cetak kupon distribusi</p></div></div>
    <div class="stat-grid">
      <div class="stat-card" style="color:#7c3aed"><div class="stat-icon">🎫</div><div class="stat-val" style="color:#7c3aed">${myMustahiq.length}</div><div class="stat-lbl">Total Kupon</div></div>
      <div class="stat-card" style="color:#2563eb"><div class="stat-icon">🖨️</div><div class="stat-val" style="color:#2563eb">${myMustahiq.filter(m=>m.kuponCetak).length}</div><div class="stat-lbl">Sudah Dicetak</div></div>
      <div class="stat-card" style="color:#d97706"><div class="stat-icon">⬜</div><div class="stat-val" style="color:#d97706">${myMustahiq.filter(m=>!m.kuponCetak).length}</div><div class="stat-lbl">Belum Dicetak</div></div>
      <div class="stat-card" style="color:#16a34a"><div class="stat-icon">✅</div><div class="stat-val" style="color:#16a34a">${myMustahiq.filter(m=>m.status==="sudah").length}</div><div class="stat-lbl">Sudah Dipakai</div></div>
    </div>
    <div class="toolbar">
      <div class="search-box"><span>🔍</span><input class="search-input" value="${STATE.kuponSearch}" oninput="STATE.kuponSearch=this.value;renderPage()" placeholder="Cari nama atau kode..."></div>
      <select class="select" onchange="STATE.kuponFilterW=this.value;renderPage()">
        <option value="semua">Semua Wilayah</option>
        ${wilayahs.map(w=>`<option value="${w}" ${STATE.kuponFilterW===w?"selected":""}>${w}</option>`).join("")}
      </select>
      <select class="select" onchange="STATE.kuponFilterC=this.value;renderPage()">
        <option value="semua">Semua Status</option>
        <option value="belum" ${STATE.kuponFilterC==="belum"?"selected":""}>Belum Dicetak</option>
        <option value="cetak" ${STATE.kuponFilterC==="cetak"?"selected":""}>Sudah Dicetak</option>
      </select>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <button class="btn btn-sm" style="background:#7c3aed;color:#fff" onclick="printAllKupon()">🖨️ Cetak Semua (${filtered.length})</button>
    </div>
    ${belumCetak>0?`<div style="background:#fffbeb;border:1px solid #fcd34d;border-radius:8px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:8px"><span>⚠️</span><span style="color:#92400e;font-size:13px"><strong>${belumCetak} kupon</strong> belum dicetak. Cetak sebelum hari distribusi.</span></div>`:""}
    ${filtered.length===0?`<div class="empty-state">Tidak ada kupon sesuai filter</div>`:""}
    ${cards}
  </div>`;
}

function previewKupon(id){
  const m=STATE.mustahiq.find(x=>x.id===id);if(!m)return;
  const box=document.getElementById("modal-box");
  box.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <div class="modal-title">🎫 Preview Kupon</div>
    <button onclick="closeModal()" style="background:none;border:none;font-size:20px;cursor:pointer">✖</button>
  </div>
  <div style="overflow-x:auto;margin-bottom:14px">${kuponHTML(m,false)}</div>
  <div style="background:#f8fafc;border-radius:8px;padding:10px;margin-bottom:14px;font-size:12px;color:#475569">
    <strong>Kode:</strong> <code style="color:#7c3aed;font-weight:700">${m.kuponKode}</code><br>
    <strong>Status:</strong> ${m.status==="sudah"?"✅ Sudah Dipakai":"⏳ Belum Dipakai"}<br>
    <strong>Cetak:</strong> ${m.kuponCetak?"🖨️ Sudah":"⬜ Belum"}
  </div>
  <div style="display:flex;gap:10px">
    <button class="btn btn-secondary" style="flex:1" onclick="closeModal()">Tutup</button>
    <button class="btn" style="flex:1;background:#7c3aed;color:#fff" onclick="printKupon('${id}');closeModal()">🖨️ Cetak</button>
  </div>`;
  document.getElementById("modal-overlay").classList.add("show");
}

function printKupon(id){
  const m=STATE.mustahiq.find(x=>x.id===id);if(!m)return;
  const idx=STATE.mustahiq.findIndex(x=>x.id===id);
  if(idx>=0)STATE.mustahiq[idx].kuponCetak=true;
  saveData();
  const area=document.getElementById("kupon-print-area");
  area.innerHTML=kuponHTML(m,true);
  showToast("Membuka dialog cetak...");
  setTimeout(()=>window.print(),200);
}

function printAllKupon(){
  const myMustahiq=STATE.user.role==="pendataan"?STATE.mustahiq.filter(m=>m.wilayah===STATE.user.wilayah):STATE.mustahiq;
  myMustahiq.forEach(m=>{const i=STATE.mustahiq.findIndex(x=>x.id===m.id);if(i>=0)STATE.mustahiq[i].kuponCetak=true;});
  saveData();
  const area=document.getElementById("kupon-print-area");
  area.innerHTML=myMustahiq.map(m=>kuponHTML(m,true)).join("<div style='width:8px'></div>");
  showToast("Mencetak "+myMustahiq.length+" kupon...");
  setTimeout(()=>window.print(),200);
}

function renderDistribusi(){
  const tabs=[
    {key:"camera",label:"📷 Kamera",sub:"Scan QR/barcode"},
    {key:"manual",label:"⌨️ Kode Manual",sub:"Ketik kode kupon"},
    {key:"list",  label:"📋 Daftar",sub:"Pilih dari antrian"},
  ];
  const tabBar=`<div class="tab-bar">${tabs.map(t=>`<button class="tab-btn${STATE.scanMode===t.key?" active":""}" onclick="setScanMode('${t.key}')">${t.label}<span class="tab-sub">${t.sub}</span></button>`).join("")}</div>`;

  const pending=STATE.mustahiq.filter(m=>m.status==="belum");
  const totalKg=STATE.scanLog.reduce((s,d)=>s+d.jumlahKG,0).toFixed(1);

  let modeContent="";

  else if(STATE.scanMode==="manual") modeContent=renderManualScanner();

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div class="card-title" style="margin:0">📜 Log Sesi Ini</div>
      <span style="background:#dcfce7;color:#16a34a;font-weight:700;padding:3px 10px;border-radius:20px;font-size:12px">${STATE.scanLog.length} distribusi • ${totalKg} kg</span>
    </div>
    <div class="tbl-wrap"><table class="tbl"><thead><tr><th>Waktu</th><th>Nama</th><th>Kupon</th><th>Jatah</th><th>Batal</th></tr></thead><tbody>
      ${STATE.scanLog.map((d,i)=>`<tr style="background:${i===0?"#f0fdf4":""}">
        <td><code style="font-size:10px">${fmtTime(d.waktu)}</code></td>
        <td><strong style="font-size:12px">${d.nama}</strong><div style="font-size:10px;color:#94a3b8">${d.wilayah}</div></td>
        <td><code style="color:#7c3aed;font-size:10px;font-weight:700">${d.kuponKode}</code></td>
        <td><strong style="color:#16a34a">${d.jumlahKG} kg</strong></td>
        <td><button style="background:#fef2f2;color:#dc2626;border:none;padding:4px 8px;border-radius:5px;cursor:pointer;font-size:11px;font-weight:600" onclick="undoDistribusi('${d.id}')" title="Batalkan distribusi ini">↩ Batal</button></td>
      </tr>`).join("")}
    </tbody></table></div>
    <div style="font-size:10px;color:#94a3b8;margin-top:8px">↩ Batalkan hanya untuk koreksi kesalahan input pada sesi ini.</div>
  </div>`:"";

  return `<div class="page">

function submitManualKupon(){
  const kode=(STATE.kuponInput||"").trim().toUpperCase();
  if(!kode){showToast("Masukkan kode kupon!","error");return;}
  const target=STATE.mustahiq.find(m=>m.kuponKode===kode);
  if(!target){STATE.scanResult={status:"notfound",kode};STATE.confirmPending=null;renderPage();return;}
  if(target.status==="sudah"){STATE.scanResult={status:"used",mustahiq:target};STATE.confirmPending=null;renderPage();return;}
  STATE.confirmPending=target;STATE.scanResult=null;STATE.kuponInput="";renderPage();
}

// ── LIST MODE ──
function renderListMode(pending){
  const wilayahs=[...new Set(STATE.mustahiq.map(m=>m.wilayah))];
  const filtered=pending.filter(m=>{
    const ms=m.nama.toLowerCase().includes(STATE.distSearch.toLowerCase())||m.nik.includes(STATE.distSearch)||m.kuponKode.includes(STATE.distSearch.toUpperCase());
    const mw=STATE.distFilterW==="semua"||m.wilayah===STATE.distFilterW;
    return ms&&mw;
  });

  const confirmHTML=STATE.confirmPending&&STATE.scanMode==="list"?`<div class="confirm-card" style="margin-bottom:12px">
    <div style="font-weight:800;font-size:13px;color:#0369a1;margin-bottom:10px">🔍 Konfirmasi Distribusi</div>
    <div style="display:flex;gap:12px;align-items:center">
      <div style="flex-shrink:0;border:1px solid #e2e8f0;border-radius:6px;padding:3px;background:white">${qrSVG(STATE.confirmPending.kuponKode,100)}</div>
      <div style="flex:1">
        <div style="font-weight:800;font-size:15px">${STATE.confirmPending.nama}</div>
        <div style="font-size:11px;color:#64748b">${STATE.confirmPending.wilayah}</div>
        <span style="background:#fef3c7;color:#92400e;border-radius:4px;padding:2px 8px;font-size:13px;font-weight:800;display:inline-block;margin-top:4px">🥩 ${STATE.confirmPending.jumlahKG} kg</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px">
        <button class="btn btn-secondary btn-sm" onclick="cancelConfirm()">✖</button>
        <button class="btn btn-green btn-sm" onclick="confirmDist()">✅</button>
      </div>
    </div>
  </div>`:"";

  const rows=filtered.map((m,i)=>`<tr style="background:${STATE.confirmPending&&STATE.confirmPending.id===m.id?"#f0f9ff":""}">
    <td>${i+1}</td>
    <td><strong style="font-size:12px">${m.nama}</strong><div style="font-size:10px;color:#94a3b8">${m.wilayah}</div></td>
    <td><code style="font-size:10px;color:#7c3aed;font-weight:700">${m.kuponKode}</code></td>
    <td><strong style="color:#dc2626">${m.jumlahKG} kg</strong></td>
    <td><button class="btn btn-sm" style="background:${STATE.confirmPending&&STATE.confirmPending.id===m.id?"#0ea5e9":"#16a34a"};color:#fff" onclick="listSelectConfirm('${m.id}')">${STATE.confirmPending&&STATE.confirmPending.id===m.id?"Konfirm":"✅"}</button></td>
  </tr>`).join("");

  return `<div>
    <div class="toolbar">
      <div class="search-box"><span>🔍</span><input class="search-input" value="${STATE.distSearch}" oninput="STATE.distSearch=this.value;renderPage()" placeholder="Cari nama atau NIK..."></div>
      <select class="select" onchange="STATE.distFilterW=this.value;renderPage()">
        <option value="semua">Semua Wilayah</option>
        ${wilayahs.map(w=>`<option value="${w}" ${STATE.distFilterW===w?"selected":""}>${w}</option>`).join("")}
      </select>
    </div>
    ${confirmHTML}
    <div class="card">
      <div style="font-size:11px;color:#94a3b8;margin-bottom:8px">Antrian: <strong style="color:#d97706">${filtered.length} mustahiq</strong></div>
      <div class="tbl-wrap"><table class="tbl">
        <thead><tr><th>No</th><th>Nama</th><th>Kupon</th><th>Jatah</th><th>Aksi</th></tr></thead>
        <tbody>${filtered.length===0?`<tr><td colspan="5" style="text-align:center;color:#94a3b8;padding:24px">🎉 Semua sudah terdistribusi!</td></tr>`:rows}</tbody>
      </table></div>
    </div>
  </div>`;
}

function listSelectConfirm(id){
  if(STATE.confirmPending&&STATE.confirmPending.id===id){confirmDist();return;}
  const m=STATE.mustahiq.find(x=>x.id===id);if(!m)return;
  STATE.confirmPending=m;renderPage();
}

function renderScanResult(){
  const r=STATE.scanResult;
  if(!r)return "";
  if(r.status==="ok")return `<div class="result-ok"><div class="result-title" style="color:#16a34a">✅ DISTRIBUSI BERHASIL</div><div style="font-size:13px;color:#166534"><strong>${r.mustahiq.nama}</strong> — ${r.mustahiq.wilayah}<br><span style="font-size:15px;font-weight:800;color:#16a34a">🥩 ${r.mustahiq.jumlahKG} kg</span></div></div>`;
  if(r.status==="used")return `<div class="result-warn"><div class="result-title" style="color:#d97706">⚠️ KUPON SUDAH DIPAKAI</div><div style="font-size:13px;color:#92400e"><strong>${r.mustahiq.nama}</strong> sudah mengambil daging sebelumnya.</div></div>`;
  return `<div class="result-err"><div class="result-title" style="color:#dc2626">❌ KUPON TIDAK VALID</div><div style="font-size:13px;color:#991b1b">Kode <code style="background:#fee2e2;padding:0 4px;border-radius:3px">${r.kode}</code> tidak ditemukan.</div></div>`;
}

function cancelConfirm(){STATE.confirmPending=null;STATE.scanResult=null;if(STATE.scanMode==="camera")startCamera();renderPage();}
function confirmDist(){
  if(!STATE.confirmPending)return;
  doDistribute(STATE.confirmPending);
  STATE.scanResult={status:"ok",mustahiq:STATE.confirmPending};
  const nama=STATE.confirmPending.nama,kg=STATE.confirmPending.jumlahKG;
  STATE.confirmPending=null;
  showToast(nama+" — "+kg+" kg berhasil dicatat!");
  renderPage();
  if(STATE.scanMode==="camera")setTimeout(()=>startCamera(),2500);
}

function undoDistribusi(distId){
  const rec=STATE.distribusi.find(d=>d.id===distId);
  if(!rec){showToast("Data distribusi tidak ditemukan!","error");return;}
  openModal(
    "Batalkan Distribusi",
    "Batalkan distribusi untuk "+rec.nama+" ("+rec.jumlahKG+" kg)? Status mustahiq akan dikembalikan ke 'Belum'.",
    "Ya, Batalkan",true,
    ()=>{
      // hapus dari distribusi
      STATE.distribusi=STATE.distribusi.filter(d=>d.id!==distId);
      // hapus dari scanLog sesi ini
      STATE.scanLog=STATE.scanLog.filter(d=>d.id!==distId);
      // kembalikan status mustahiq
      const idx=STATE.mustahiq.findIndex(m=>m.id===rec.mustahiqId);
      if(idx>=0)STATE.mustahiq[idx]={...STATE.mustahiq[idx],status:"belum",distribusiId:null};
      saveData();
      showToast("Distribusi "+rec.nama+" berhasil dibatalkan.","warn");
      renderPage();
    }
  );
}

function saveHewan(){
  _hForm.nomorHewan=(document.getElementById("hf-nomor")?.value||"").trim();
  _hForm.beratKg=document.getElementById("hf-berat")?.value||"";
  _hForm.estimasiDaging=document.getElementById("hf-daging")?.value||"";

  if(!_hForm.beratKg||parseFloat(_hForm.beratKg)<=0){showToast("Berat hewan harus lebih dari 0!","error");return;}
  // cek duplikat nomor hewan
  const dup=STATE.hewan.find(h=>h.nomorHewan===_hForm.nomorHewan&&h.id!==_editHewanId);
  if(dup){showToast("Nomor hewan '"+_hForm.nomorHewan+"' sudah terdaftar!","error");return;}
  const berat=parseFloat(_hForm.beratKg);
  const est=_hForm.estimasiDaging?parseFloat(_hForm.estimasiDaging):berat*(_hForm.jenis==="Sapi"?0.6:0.5);
  if(_editHewanId){

    if(idx>=0)STATE.hewan[idx]={...STATE.hewan[idx],jenis:_hForm.jenis,nomorHewan:_hForm.nomorHewan,beratKg:berat,estimasiDaging:parseFloat(est.toFixed(1)),status:_hForm.status};

  } else {
    STATE.hewan.push({id:genId("H"),jenis:_hForm.jenis,nomorHewan:_hForm.nomorHewan,beratKg:berat,estimasiDaging:parseFloat(est.toFixed(1)),status:_hForm.status||"siap",createdAt:todayStr()});

  }
  saveData();_showHewanForm=false;_editHewanId=null;_hForm={jenis:"Sapi",nomorHewan:"",beratKg:"",estimasiDaging:"",status:"siap"};renderPage();
}

  _pForm={username:"",password:"",name:"",role:"pendataan",wilayah:""};

}

function editPengguna(id){
  const u=STATE.users.find(x=>x.id===id);if(!u)return;
  _pForm={username:u.username,password:"",name:u.name,role:u.role,wilayah:u.wilayah||""};
  _editPenggunaId=id;_showPenggunaForm=true;renderPage();
}

function delPengguna(id){
  const u=STATE.users.find(x=>x.id===id);if(!u)return;
  if(u.id===STATE.user.id){showToast("Tidak bisa menghapus akun sendiri!","error");return;}
  const adminCount=STATE.users.filter(x=>x.role==="admin").length;
  if(u.role==="admin"&&adminCount<=1){showToast("Tidak bisa menghapus admin terakhir!","error");return;}
  openModal("Hapus Pengguna","Hapus akun @"+u.username+" ("+u.name+")?","Ya, Hapus",true,()=>{
    STATE.users=STATE.users.filter(x=>x.id!==id);saveData();showToast("Pengguna dihapus.","error");renderPage();
  });
}

function savePengguna(){
  _pForm.name=(document.getElementById("pf-nama")?.value||"").trim();
  if(!_editPenggunaId) _pForm.username=(document.getElementById("pf-user")?.value||"").trim().toLowerCase().replace(/\s+/g,"");
  _pForm.password=document.getElementById("pf-pass")?.value||"";
  _pForm.wilayah=(document.getElementById("pf-wil")?.value||"").trim();

  if(!_pForm.name||_pForm.name.length<3){showToast("Nama minimal 3 karakter!","error");return;}
  if(!_editPenggunaId){
    if(!_pForm.username||_pForm.username.length<3){showToast("Username minimal 3 karakter!","error");return;}
    if(!/^[a-z0-9_]+$/.test(_pForm.username)){showToast("Username hanya huruf kecil, angka, dan underscore!","error");return;}
    if(STATE.users.find(u=>u.username===_pForm.username)){showToast("Username '"+_pForm.username+"' sudah digunakan!","error");return;}
  }
  if(!_editPenggunaId&&(!_pForm.password||_pForm.password.length<6)){showToast("Password minimal 6 karakter!","error");return;}
  if(_editPenggunaId&&_pForm.password&&_pForm.password.length<6){showToast("Password baru minimal 6 karakter!","error");return;}
  if(_pForm.role==="pendataan"&&!_pForm.wilayah){showToast("Wilayah wajib diisi untuk role Pendataan!","error");return;}

  if(_editPenggunaId){
    const idx=STATE.users.findIndex(u=>u.id===_editPenggunaId);
    if(idx>=0){
      STATE.users[idx]={...STATE.users[idx],name:_pForm.name,role:_pForm.role,wilayah:_pForm.wilayah||null};
      if(_pForm.password)STATE.users[idx].password=_pForm.password;
      // update STATE.user jika edit diri sendiri
      if(STATE.user.id===_editPenggunaId)STATE.user={...STATE.users[idx]};
    }
    showToast("Data pengguna diperbarui.");
  } else {
    STATE.users.push({id:genId("U"),username:_pForm.username,password:_pForm.password,name:_pForm.name,role:_pForm.role,wilayah:_pForm.wilayah||null});
    showToast("Pengguna ditambahkan.");
  }
  saveData();_showPenggunaForm=false;_editPenggunaId=null;_pForm={username:"",password:"",name:"",role:"pendataan",wilayah:""};renderPage();
}

function csvEscape(v){
  const s=String(v===null||v===undefined?"":v);
  return s.includes(",")||s.includes('"')||s.includes("\n")?'"'+s.replace(/"/g,'""')+'"':s;
}

function downloadFile(filename,content,mimeType){
  const blob=new Blob(["﻿"+content],{type:mimeType});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=filename;a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

function exportCSV(type){
  const now=new Date().toLocaleDateString("id-ID").replace(/\//g,"-");
  if(type==="mustahiq"){
    const header=["No","Nama","NIK","Alamat","Wilayah","Kategori","Jatah (kg)","Kode Kupon","Kupon Dicetak","Status","Tanggal Daftar"];
    const rows=STATE.mustahiq.map((m,i)=>[
      i+1,m.nama,m.nik,m.alamat,m.wilayah,m.kategori,m.jumlahKG,m.kuponKode,
      m.kuponCetak?"Ya":"Tidak",m.status==="sudah"?"Sudah":"Belum",m.tanggal||""
    ].map(csvEscape).join(","));
    downloadFile("mustahiq-"+now+".csv",[header.join(","),...rows].join("\n"),"text/csv");
    showToast("CSV Mustahiq berhasil diunduh ("+STATE.mustahiq.length+" data)");
  } else if(type==="distribusi"){
    const header=["No","Waktu","Nama","NIK","Wilayah","Kode Kupon","Jatah (kg)","Metode"];
    const rows=[...STATE.distribusi].sort((a,b)=>b.waktu.localeCompare(a.waktu)).map((d,i)=>[
      i+1,new Date(d.waktu).toLocaleString("id-ID"),d.nama,d.nik||"",d.wilayah,d.kuponKode,d.jumlahKG,d.metode||""
    ].map(csvEscape).join(","));
    if(rows.length===0){showToast("Belum ada data distribusi!","warn");return;}
    downloadFile("distribusi-"+now+".csv",[header.join(","),...rows].join("\n"),"text/csv");
    showToast("CSV Distribusi berhasil diunduh ("+rows.length+" transaksi)");
  }
}

function exportJSON(){
  const now=new Date().toLocaleDateString("id-ID").replace(/\//g,"-");
  const payload={
    exportedAt:new Date().toISOString(),
    version:"siqdist_v1",
    mustahiq:STATE.mustahiq,
    hewan:STATE.hewan,
    users:STATE.users.map(u=>({...u,password:"[REDACTED]"})),
    distribusi:STATE.distribusi
  };
  downloadFile("siqdist-backup-"+now+".json",JSON.stringify(payload,null,2),"application/json");
  showToast("Backup JSON berhasil diunduh");
}

function triggerImport(){
  document.getElementById("import-file-input")?.click();
}

function importJSON(event){
  const file=event.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const d=JSON.parse(e.target.result);
      if(!d.mustahiq||!d.hewan){showToast("File JSON tidak valid atau bukan backup SIQDIST!","error");return;}
      openModal(
        "Import Data Backup",
        "Semua data saat ini ("+STATE.mustahiq.length+" mustahiq, "+STATE.distribusi.length+" distribusi) akan digantikan oleh data dari file '"+file.name+"'. Lanjutkan?",
        "Ya, Import",true,
        ()=>{
          if(d.mustahiq) STATE.mustahiq=d.mustahiq;
          if(d.hewan)    STATE.hewan=d.hewan;
          if(d.distribusi)STATE.distribusi=d.distribusi;
          // password dari backup sudah di-redact, jangan timpa users
          saveData();
          showToast("Import berhasil! "+d.mustahiq.length+" mustahiq dimuat.");
          renderPage();
        }
      );
    }catch(err){
      showToast("File tidak bisa dibaca. Pastikan format JSON valid!","error");
    }
    event.target.value=""; // reset input
  };
  reader.readAsText(file);
}

// ================================================================
// INIT
// ================================================================
render();
</script>
</body>
